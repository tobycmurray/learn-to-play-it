name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libsndfile1 libportaudio2

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-

      - name: Cache Demucs model
        uses: actions/cache@v4
        with:
          path: ~/.cache/torch/hub/checkpoints
          key: demucs-htdemucs_6s

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run tests
        run: pytest tests/ -v --timeout=300

      - name: Audit lock files for known vulnerabilities
        # Informational for now — doesn't fail the build. Flip to failing
        # once we trust the signal-to-noise ratio.
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit -r requirements.lock
          pip-audit -r requirements-gui.lock
