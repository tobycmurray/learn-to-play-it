name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libsndfile1 libportaudio2

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-

      - name: Cache Demucs model
        uses: actions/cache@v4
        with:
          path: ~/.cache/torch/hub/checkpoints
          key: demucs-htdemucs_6s

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run tests
        run: pytest tests/ -v --timeout=300

      - name: Audit lock files for known vulnerabilities
        run: |
          pip install pip-audit
          pip-audit -r requirements.lock
          pip-audit -r requirements-gui.lock

  lockfile-fresh:
    # Notification-only check: regenerates the lockfiles from pyproject.toml
    # and fails (red ✗ → email) if the committed lockfiles drift. Does not
    # block pushes — GitHub runs CI after the push lands. The fix is to run
    # packaging/update_locks.sh, review the diff, and commit.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-tools
        run: pip install pip-tools

      - name: Regenerate lockfiles
        run: |
          pip-compile --quiet --generate-hashes --output-file requirements.lock pyproject.toml
          pip-compile --quiet --generate-hashes --extra=gui --output-file requirements-gui.lock pyproject.toml

      - name: Fail if lockfiles drifted
        run: |
          if ! git diff --exit-code requirements.lock requirements-gui.lock; then
            echo "::error::Lockfiles are out of sync with pyproject.toml. Run packaging/update_locks.sh and commit." >&2
            exit 1
          fi
