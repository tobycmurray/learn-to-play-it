name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege token: neither job writes anything (no commits, no releases,
# no PR comments). If a future job needs write access, override at the job
# level rather than relaxing this workflow-wide default.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libsndfile1 libportaudio2

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-

      - name: Cache Demucs model
        uses: actions/cache@v4
        with:
          path: ~/.cache/torch/hub/checkpoints
          key: demucs-htdemucs_6s

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run tests
        run: pytest tests/ -v --timeout=300

  lockfile-audit:
    # Two checks here:
    #   1. pip-audit against the lockfiles (known CVEs).
    #   2. lockfile-fresh: regenerate from pyproject.toml and fail if the
    #      committed lockfiles drift, so a missed update_locks.sh after a
    #      pyproject.toml edit shows up as a red ✗ + notification email.
    #      Does not block pushes — GitHub runs CI after the push lands.
    #
    # Runs on ubuntu-latest because uv pip compile --universal produces
    # cross-platform lockfiles (markers like `; sys_platform == 'linux'` on
    # CUDA deps), so the regen is platform-independent.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv and pip-audit
        run: pip install uv pip-audit

      - name: Audit lock files for known vulnerabilities
        run: |
          pip-audit -r requirements.lock
          pip-audit -r requirements-gui.lock

      - name: Regenerate lockfiles
        run: |
          uv pip compile --quiet --universal --generate-hashes --output-file requirements.lock pyproject.toml
          uv pip compile --quiet --universal --generate-hashes --extra=gui --output-file requirements-gui.lock pyproject.toml

      - name: Fail if lockfiles drifted
        run: |
          if ! git diff --exit-code requirements.lock requirements-gui.lock; then
            echo "::error::Lockfiles are out of sync with pyproject.toml. Run packaging/update_locks.sh and commit." >&2
            exit 1
          fi
