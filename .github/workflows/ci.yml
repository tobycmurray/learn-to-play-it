name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg rubberband-cli libsndfile1 libportaudio2

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-

      - name: Cache Demucs model
        uses: actions/cache@v4
        with:
          path: ~/.cache/torch/hub/checkpoints
          key: demucs-htdemucs_6s

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run smoke tests
        run: pytest tests/test_smoke.py -v

      - name: Run separation and audio tests
        run: pytest tests/test_separate.py tests/test_audio.py -v --timeout=300
