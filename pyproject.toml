[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "learn-to-play-it"
version = "0.1.0"
description = "Learn to play musical parts from recorded songs"
license = "MIT"
requires-python = ">=3.10"
dependencies = [
    "demucs",
    "pyrubberband",
    "soundfile",
    "sounddevice",
    "numpy",
    "click",
]

[project.scripts]
ltpi = "learntoplayit.cli:main"
